; CYD — all variants: 2432W328R, 2432S024R, 2432S028, 2432W328C, 3248S035R, 3248S035C.
; Source and include path point to the shared cyd/ board folder.
[cyd_common]
board_build.partitions = firmware/partitions_4mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/cyd>
build_unflags = -DHAS_NET_TOOLS
build_flags =
	${env.build_flags}
	-Ifirmware/boards/cyd
	-DDEVICE_CYD
lib_deps =
	${env.lib_deps}

; CYD-2432W328R / 2432S024R
;   ILI9341 240×320, XPT2046 shared HSPI (CS=33, IRQ=36) — TFT_eSPI getTouch().
;   BL=27, SDA=21, 55 MHz. CAL_ORIENT=1: setTouch() swap-XY flag for this wiring.
[env:cyd_2432w328r]
extends = cyd_common
board = cyd_2432w328r
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=27
	-DGROVE_SDA=21
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DCAL_X_MIN=185
	-DCAL_X_MAX=3700
	-DCAL_Y_MIN=280
	-DCAL_Y_MAX=3850
	-DCAL_ORIENT=1

; CYD-2432S028
;   ILI9341 240×320, XPT2046 dedicated SPI (MOSI=32, MISO=39, SCK=25) — bit-bang.
;   BL=21, SDA=27, 40 MHz.
[env:cyd_2432s028]
extends = cyd_common
board = cyd_2432s028
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=21
	-DGROVE_SDA=27
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DTOUCH_SPI_MOSI=32
	-DTOUCH_SPI_MISO=39
	-DTOUCH_SPI_SCK=25
	-DCAL_X_MIN=185
	-DCAL_X_MAX=3700
	-DCAL_Y_MIN=280
	-DCAL_Y_MAX=3850

; CYD-2432S028 2USB — same hardware as 2432S028 but display panel has inverted colors
; and touch panel is physically rotated 90° (XY swapped relative to screen).
; CAL_SWAP_XY was previously a compile-time flag here; now detected at first-boot runtime
; via CYDTouchCalScreen and saved to config (APP_CONFIG_TOUCH_SWAP_XY).
[env:cyd_2432s028_2usb]
extends = cyd_common
board = cyd_2432s028
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=21
	-DGROVE_SDA=27
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DTOUCH_SPI_MOSI=32
	-DTOUCH_SPI_MISO=39
	-DTOUCH_SPI_SCK=25
	-DCAL_X_MIN=185
	-DCAL_X_MAX=3700
	-DCAL_Y_MIN=280
	-DCAL_Y_MAX=3850
	-DTFT_INVERSION_ON

; CYD-2432W328C
;   ILI9341 240×320, CST816S capacitive touch (I2C, addr=0x15, SDA=21, SCL=22, INT=36).
;   BL=27, SDA=21, 55 MHz. TOUCH_CST816S suppresses XPT2046 TOUCH_CS in pins_arduino.h.
[env:cyd_2432w328c]
extends = cyd_common
board = cyd_2432w328c
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=27
	-DGROVE_SDA=21
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DTOUCH_CST816S

; CYD-2432W328C variant 2 — same hardware as 2432W328C but inverted display colors.
[env:cyd_2432w328c_2]
extends = cyd_common
board = cyd_2432w328c
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=27
	-DGROVE_SDA=21
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DTOUCH_CST816S
	-DTFT_INVERSION_ON

; CYD-3248S035R
;   ST7796 480×320, XPT2046 dedicated SPI (MOSI=32, MISO=39, SCK=25) — bit-bang.
;   BL=27, SDA=21, 40 MHz.
[env:cyd_3248s035r]
extends = cyd_common
board = cyd_3248s035
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=27
	-DGROVE_SDA=21
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DST7796_DRIVER
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
	-DTOUCH_SPI_MOSI=32
	-DTOUCH_SPI_MISO=39
	-DTOUCH_SPI_SCK=25
	-DCAL_X_MIN=185
	-DCAL_X_MAX=3700
	-DCAL_Y_MIN=280
	-DCAL_Y_MAX=3850

; CYD-3248S035C
;   ST7796 480×320, GT911 capacitive touch (I2C, SDA=33, SCL=32, INT=25, RST=21).
;   BL=27, SDA=21, 40 MHz. lewisxhe/SensorLib required for GT911 driver.
[env:cyd_3248s035c]
extends = cyd_common
board = cyd_3248s035
build_flags =
	${cyd_common.build_flags}
	-DLCD_BL=27
	-DGROVE_SDA=21
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DST7796_DRIVER
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
	-DTOUCH_GT911
	-DGT911_SDA=33
	-DGT911_SCL=32
	-DGT911_INT=25
	-DGT911_RST=21
	-DGT911_I2C_ADDR=0x5D
lib_deps =
	${env.lib_deps}
	lewisxhe/SensorLib@0.3.4
