[env:t_display_s3]
board = t_display_s3
board_build.partitions = firmware/partitions_16mb.csv

build_src_filter = ${env.build_src_filter} +<../boards/t_display_s3>
build_flags =
	${env.build_flags}
	-Ifirmware/boards/t_display_s3

lib_deps =
	${env.lib_deps}


; Touch variant: LilyGo "T-Display S3 Touch" with CST820/CST816-compatible
; capacitive touch IC on I2C 18/17, INT=16, RST=21, addr 0x15.
; Buttons (GPIO 0/14) keep their existing nav behaviour; touch is an additional
; input source. DEVICE_HAS_TOUCH_NAV is intentionally NOT defined here so we
; don't switch the UI into touch-only mode meant for button-less boards (CYD).
[env:t_display_s3_touch]
extends = env:t_display_s3
build_flags =
	${env:t_display_s3.build_flags}
	-DDEVICE_T_DISPLAY_S3_TOUCH
	-DDEVICE_HAS_TOUCH
