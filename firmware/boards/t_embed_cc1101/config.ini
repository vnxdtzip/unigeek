[env:t_embed_cc1101]
board = t_embed_cc1101
board_build.arduino.memory_type = qio_opi
board_build.partitions = firmware/partitions_16mb.csv
build_src_filter =${env.build_src_filter} +<../boards/t_embed_cc1101>
build_flags =
	${env.build_flags}
	-Ifirmware/boards/t_embed_cc1101
	-O2
	-DCORE_DEBUG_LEVEL=1
	-DCONFIG_SPIRAM_SUPPORT=1
	-DT_EMBED_CC1101

lib_deps =
	${env.lib_deps}
	mathertel/RotaryEncoder@^1.5.3
	lewisxhe/XPowersLib@^0.2.0
	fastled/FastLED@^3.6.0
