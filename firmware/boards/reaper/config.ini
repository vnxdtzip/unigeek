[env:reaper]
board = reaper
board_build.arduino.memory_type = qio_opi
board_build.partitions = firmware/partitions_16mb.csv
build_src_filter =${env.build_src_filter} +<../boards/reaper>
build_flags =
	${env.build_flags}
	-Ifirmware/boards/reaper
	-O2
	-DCORE_DEBUG_LEVEL=1
	-DCONFIG_SPIRAM_SUPPORT=1

lib_deps =
	${env.lib_deps}
	fastled/FastLED@^3.6.0
