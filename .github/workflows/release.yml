name: Build and Release

on:
  release:
    types: [created]
  push:
    tags:
      - '[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - m5stickcplus_11
          - m5stickcplus_2
          - t_lora_pager
          - m5_cardputer
          - m5_cardputer_adv
          - t_display
          - t_display_s3
          - t_display_s3_touch
          - diy_smoochie
          - t_embed_cc1101
          - m5_cores3
          - m5sticks3
          - cyd_2432w328r
          - cyd_2432s028
          - cyd_2432s028_2usb
          - cyd_2432w328c
          - cyd_2432w328c_2
          - cyd_3248s035r
          - cyd_3248s035c

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: pio-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'firmware/boards/**') }}
          restore-keys: pio-${{ matrix.env }}-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.env }}
        env:
          PLATFORMIO_BUILD_SRC_FLAGS: -DFIRMWARE_VERSION='"${{ github.ref_name }}"'
        run: pio run -e ${{ matrix.env }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          files: builds/unigeek-${{ matrix.env }}.bin

  build-website:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build website
        working-directory: website
        env:
          NEXT_PUBLIC_FIRMWARE_VERSION: ${{ github.ref_name }}
        run: |
          npm ci
          npm run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-website
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
